<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | NailssxMocha</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&family=Pinyon+Script&display=swap"   rel="stylesheet">
</head>

<body>

  <header>
    <div class="nav">
      <div class="brand">
        <img src="images/Logo.jpg" alt="Nails x Mocha Logo">
      </div>

      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Services</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="policy.html">Policy</a>
        <a href="https://nailssxmocha-booking.as.me/" class="book-btn">Book</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="gallery">
      <h2 class="gallery-title">Nail Gallery</h2>

      <div class="gallery">
  <img src="images/nail1.jpeg" data-index="0" onclick="openImage(this)">
  <img src="images/nail2.jpeg" data-index="1" onclick="openImage(this)">
  <img src="images/nail3.jpeg" data-index="2" onclick="openImage(this)">
  <img src="images/nail4.jpeg" data-index="3" onclick="openImage(this)">
  <img src="images/nail5.jpeg" data-index="4" onclick="openImage(this)">
  <img src="images/nail6.jpeg" data-index="5" onclick="openImage(this)">
  <img src="images/nail7.jpeg" data-index="6" onclick="openImage(this)">
  <img src="images/nail8.jpeg" data-index="7" onclick="openImage(this)">
</div>

      <div id="lightbox">
	<button class="close-btn" onclick="closeImage()">✖</button>
         <button class="prev" onclick="showPrev(event)">❮</button>
         <div class="lightbox-track" id="lightbox-track"></div>
         <button class="next" onclick="showNext(event)">❯</button>
         <div class="dots" id="dots"></div>
</div>
    </section>
  </main>

 <script>
  const images = document.querySelectorAll(".gallery img");
  let currentIndex = 0;

  let startX = 0;
  let startY = 0;

  let isSwiping = false;

  const lightbox = document.getElementById("lightbox");
  const track = document.getElementById("lightbox-track");
  const dotsContainer = document.getElementById("dots");

track.addEventListener("click", (e) => {
  e.stopPropagation();
});

  let currentTranslate = 0;
  let prevTranslate = 0;

  function openImage(img) {
    currentIndex = parseInt(img.dataset.index, 10);

if (isNaN(currentIndex)) {
  console.warn("Invalid index from clicked image");
  return;
}
    console.log("openImage:Current Index:", currentIndex);
    console.log("openImage:Is First Slide?", currentIndex === 0);
    console.log("openImage:Is Last Slide?", currentIndex === images.length - 1);

    currentTranslate = 0;
    prevTranslate = 0;

    track.innerHTML = "";
    dotsContainer.innerHTML = "";

    images.forEach((image, i) => {
  const clone = image.cloneNode();
  clone.dataset.index = i;

  track.appendChild(clone);

  const dot = document.createElement("span");
  if (i === currentIndex) {
    dot.classList.add("active");
  }
  dotsContainer.appendChild(dot);
});

    lightbox.style.display = "flex";

    setTimeout(() => {
      lightbox.classList.add("active");
      updateSlide();
    }, 10);
  }

  function updateSlide() {
    console.log("updatesSlide:Current Index:", currentIndex);
    console.log("updatesSlide:Is First Slide?", currentIndex === 0);
    console.log("updatesSlide:Is Last Slide?", currentIndex === images.length - 1);

    currentIndex = Math.max(0, Math.min(currentIndex, images.length - 1));

  const slideWidth = lightbox.offsetWidth;

  currentTranslate = -currentIndex * slideWidth;
  prevTranslate = currentTranslate;

  track.style.transition = "transform 0.4s ease";
  track.style.transform = `translateX(${currentTranslate}px)`;

  const dots = document.querySelectorAll(".dots span");
  dots.forEach((d, i) => {
    d.classList.toggle("active", i === currentIndex);
  });
}

  function showNext(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    console.log("showNext:Current Index:", currentIndex);
    console.log("showNext:Is First Slide?", currentIndex === 0);
    console.log("showNext:Is Last Slide?", currentIndex === images.length - 1);
    updateSlide();
  }

  function showPrev(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    console.log("showPrev:Current Index:", currentIndex);
    console.log("showPrev:Is First Slide?", currentIndex === 0);
    console.log("showPrev:Is Last Slide?", currentIndex === images.length - 1);
    updateSlide();
  }

  function closeImage() {
    lightbox.classList.remove("active");

    setTimeout(() => {
      lightbox.style.display = "none";
    }, 300);
  }

  lightbox.addEventListener("click", function (e) {

    if (e.target === lightbox) {
      closeImage();
    }
  });

  lightbox.addEventListener("touchstart", (e) => {
    if (e.target.tagName !== "IMG") return;

    isSwiping = false;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  });

  lightbox.addEventListener("touchmove", (e) => {
    if (e.target.tagName !== "IMG") return;

    const moveX = e.touches[0].clientX;
    const diff = moveX - startX;

    if (Math.abs(diff) > 10) {
      isSwiping = true;
    }

    const slideWidth = lightbox.offsetWidth;

    const maxTranslate = 0;
    const minTranslate = -slideWidth * (images.length - 1);

    currentTranslate = prevTranslate + diff;
    currentTranslate = Math.max(
      minTranslate,
      Math.min(maxTranslate, currentTranslate)
    );

    track.style.transition = "none";
    track.style.transform = `translateX(${currentTranslate}px)`;
  });

  lightbox.addEventListener("touchend", () => {
    const movedBy = currentTranslate - prevTranslate;
    console.log("touchmove 1:Current Index:", currentIndex);
    console.log("touchmove 1:Is First Slide?", currentIndex === 0);
    console.log("touchmove 1:Is Last Slide?", currentIndex === images.length - 1);

    if (movedBy < -60) currentIndex++;
    if (movedBy > 60) currentIndex--;
    console.log("touchmove 2:Current Index:", currentIndex);
    console.log("touchmove 2:Is First Slide?", currentIndex === 0);
    console.log("touchmove 2:Is Last Slide?", currentIndex === images.length - 1);

    currentIndex = Math.max(0, Math.min(currentIndex, images.length - 1));
    console.log("touchmove 3:Current Index:", currentIndex);
    console.log("touchmove 3:Is First Slide?", currentIndex === 0);
    console.log("touchmove 3:Is Last Slide?", currentIndex === images.length - 1);

    const slideWidth = lightbox.offsetWidth;
    prevTranslate = -currentIndex * slideWidth;

    track.style.transition = "transform 0.4s ease";
    console.log("touchmove 4:Current Index:", currentIndex);
    console.log("touchmove 4:Is First Slide?", currentIndex === 0);
    console.log("touchmove 4:Is Last Slide?", currentIndex === images.length - 1);
    updateSlide();

    isSwiping = false;
  });

  function getDistance(touches) {
    return Math.hypot(
      touches[0].clientX - touches[1].clientX,
      touches[0].clientY - touches[1].clientY
    );
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") showNext();
    if (e.key === "ArrowLeft") showPrev();
    if (e.key === "Escape") closeImage();
  });
</script>

  <footer>
    <p>Follow us on Instagram</p>
    <a href="https://www.instagram.com/nailssxmocha/" target="_blank" class="social-btn">
    <div class="social-icon">
      <img src="images/instagram.png">
    </div>
    </a>
  </footer>

</body>
</html>
